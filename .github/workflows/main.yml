name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t myapp ./project

    - name: Run Application Container
      run: docker run -d -p 5050:5050 --name myapp myapp

    - name: Wait for App
      run: sleep 15

    - name: Run ZAP Scan
      run: |
       docker run --rm \
       -v $(pwd):/zap/wrk \
       owasp/zap2docker-stable \
       zap-baseline.py -t http://localhost:5050 -J zap-report.json
