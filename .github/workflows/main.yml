name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t myapp ./project

    - name: Run Application Container
      run: docker run -d -p 5050:5050 --name mycontainer myapp

    - name: Run ZAP Baseline Scan
      run: |
        docker run --network="host" \
        ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
        -t http://localhost:5050 \
        -r zap-report.html

    - name: Security Gate - Fail on High Risk
      run: |
        echo "Checking for High vulnerabilities..."
        if grep -q "High" zap-report.html; then
          echo "❌ High severity vulnerability detected!"
          exit 1
        else
          echo "✅ No High severity vulnerabilities found."
        fi
